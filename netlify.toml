[build]
  command = ""
  publish = ""

[build.environment]
  NODE_VERSION = "18"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/"
  to = "/editor.html"
  status = 302

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
