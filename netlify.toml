[build]
  command = ""
  publish = ""

[build.environment]
  NODE_VERSION = "18"

[[headers]]
  for = "/*.html"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Cache-Control = "no-cache, no-store, must-revalidate"
    # CSP: allow Supabase APIs/storage and the SheetJS/Supabase CDNs we load. Inline allowed for small SVG/style attributes.
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://*.supabase.co; connect-src 'self' https://*.supabase.co wss://*.supabase.co; frame-src 'self'; base-uri 'self'; form-action 'self'; object-src 'none'"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Pretty share links → viewer
[[redirects]]
  from = "/f/*"
  to = "/viewer.html?form=:splat"
  status = 200

[[redirects]]
  from = "/s/*"
  to = "/viewer.html?form=:splat"
  status = 200
