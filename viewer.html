<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>Formure</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="config.js"></script>
</head>
<body>
    <!-- Top Navigation Bar -->
    <nav class="top-nav">
        <div class="logo">
            <img src="formure-logo.png" alt="Formure" height="28" style="border-radius:6px;object-fit:contain">
            <span>Formure</span>
        </div>
        <div class="dynamic-stepper" id="dynamicStepper"></div>
        <div class="nav-spacer"></div>
    </nav>

    <!-- Start Screen -->
    <main class="main-container">
        <div class="form-container" id="startScreen">
            <div class="question-card start-screen">
                <h2 class="start-title" id="welcomeTitle">Hello, Welcome!</h2>
                <p class="start-subtitle" id="welcomeSubtitle">Press Start or Enter to begin</p>
                <button class="continue-btn" id="startBtn">Start</button>
            </div>
        </div>
    </main>

    <!-- Question Screen -->
    <main class="main-container" id="questionScreen" style="display: none;">
        <div class="form-container">
            <div class="question-card">
                <div class="question-indicator">
                    <span class="q-number">1</span>
                    <span class="q-arrow">→</span>
                </div>
                <h2 class="question-text"></h2>
                <p class="question-hint">Choose one</p>

                <div class="options-list"></div>

                <button class="continue-btn" id="continueBtn" disabled>Continue</button>
            </div>
        </div>
    </main>

    <!-- Results Screen -->
    <main class="main-container" id="resultsScreen" style="display: none;">
        <div class="form-container">
            <div class="results-summary">
                <h1 id="resultsTitle">Thank You!</h1>
                <p id="resultsSubtitle">You have completed this form</p>
                <button class="continue-btn" id="restartBtn">Try Again</button>
            </div>
        </div>
    </main>

    <!-- Bottom Navigation -->
    <div class="bottom-nav" id="bottomNav" style="display: none;">
        <div class="scroll-indicator">
            <span id="progressText">1/5</span>
            <div class="scroll-arrows">
                <button class="scroll-btn" id="scrollUp" disabled>
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <path d="M12 10L8 6l-4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
                <button class="scroll-btn" id="scrollDown">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                        <path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
